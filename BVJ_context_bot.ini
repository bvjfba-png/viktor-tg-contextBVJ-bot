import os
import logging
import base64
import requests as req
from datetime import datetime
from telegram import Update
from telegram.ext import Application, MessageHandler, CommandHandler, filters, ContextTypes
from github import Github, GithubException

logging.basicConfig(format="%(asctime)s - %(levelname)s - %(message)s", level=logging.INFO)
logger = logging.getLogger(__name__)

TELEGRAM_TOKEN  = os.environ["TELEGRAM_TOKEN"]
GITHUB_TOKEN    = os.environ["GITHUB_TOKEN"]
GITHUB_REPO     = os.environ["GITHUB_REPO"]
ALLOWED_USER_ID = int(os.environ.get("ALLOWED_USER_ID", "0"))

g    = Github(GITHUB_TOKEN)
repo = g.get_repo(GITHUB_REPO)

def today(): return datetime.now().strftime("%Y-%m-%d")
def month(): return datetime.now().strftime("%Y-%m")
def time_now(): return datetime.now().strftime("%H:%M")

def append_to_file(path, content):
    try:
        file = repo.get_contents(path)
        current = file.decoded_content.decode("utf-8")
        repo.update_file(path, f"update {path}", current + content, file.sha)
    except GithubException:
        repo.create_file(path, f"create {path}", content)

def upload_binary(path, data):
    encoded = base64.b64encode(data).decode("utf-8")
    resp = req.put(
        f"https://api.github.com/repos/{GITHUB_REPO}/contents/{path}",
        json={"message": f"add {path}", "content": encoded},
        headers={"Authorization": f"token {GITHUB_TOKEN}"},
    )
    return resp.status_code in (200, 201)

def is_allowed(update):
    if not ALLOWED_USER_ID: return True
    return update.effective_user.id == ALLOWED_USER_ID

def detect_category(text):
    t = text.lower()
    workout_words = ["жал", "тяга", "присед", "подтяг", "трениров", " кг", "сет", "жим", "бег"]
    metric_words  = ["вес ", "давлен", "пульс", "сон ", "темпер", "анализ", "сахар", "самочувств"]
    if any(w in t for w in workout_words):
        return f"health/workouts/{month()}.md", "💪 тренировка"
    elif any(w in t for w in metric_words):
        return f"health/metrics/{month()}.md", "📊 метрика"
    else:
        return f"journal/{month()}.md", "📝 заметка"

async def cmd_start(update, context):
    await update.message.reply_text(
        "👋 Просто пиши мне:\n• текст → дневник/тренировки/метрики\n• фото → папка еды"
    )

async def handle_text(update, context):
    if not is_allowed(update): return
    text = update.message.text
    path, category = detect_category(text)
    entry = f"\n## {today()} {time_now()}\n{text}\n"
    try:
        append_to_file(path, entry)
        await update.message.reply_text(f"✅ {category}\n`{path}`", parse_mode="Markdown")
    except Exception as e:
        await update.message.reply_text(f"❌ Ошибка: {e}")

async def handle_photo(update, context):
    if not is_allowed(update): return
    photo = update.message.photo[-1]
    file_obj = await context.bot.get_file(photo.file_id)
    img_bytes = await file_obj.download_as_bytearray()
    ts = datetime.now().strftime("%H%M%S")
    img_path = f"health/food/{today()}_{ts}.jpg"
    try:
        ok = upload_binary(img_path, bytes(img_bytes))
        if not ok:
            await update.message.reply_text("❌ Не удалось загрузить фото")
            return
        caption = update.message.caption or ""
        if caption:
            append_to_file(f"health/food/{month()}.md", f"\n## {today()} {time_now()}\n{caption}\n")
        await update.message.reply_text(f"✅ Фото сохранено 🥗\n`{img_path}`", parse_mode="Markdown")
    except Exception as e:
        await update.message.reply_text(f"❌ Ошибка: {e}")

def main():
    app = Application.builder().token(TELEGRAM_TOKEN).build()
    app.add_handler(CommandHandler("start", cmd_start))
    app.add_handler(MessageHandler(filters.TEXT & ~filters.COMMAND, handle_text))
    app.add_handler(MessageHandler(filters.PHOTO, handle_photo))
    logger.info("Bot started")
    app.run_polling()

if __name__ == "__main__":
    main()
```

